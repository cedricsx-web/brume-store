<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<script>
  (function () {
    var KEY = 'brume-theme', stored = null;
    try { stored = localStorage.getItem(KEY); } catch (e) {}
    var theme = stored;
    if (!theme) {
      var h = new Date().getHours();
      theme = (h >= 20 || h < 7) ? 'dark' : 'light';
    }
    document.documentElement.setAttribute('data-theme', theme);
  })();
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrüMe — Admin Éditions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400&family=DM+Sans:wght@300;400;500&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --sand: #c8b89a;
    --red:  #c0392b;
    --bg:          #e8e4dd;
    --bg-rgb:      232,228,221;
    --ink:         #1a1a18;
    --ink-rgb:     26,26,24;
    --surface:     #f5f2ed;
    --accent:       #2E4A8C;
    --accent-hover: #24396D;
    --on-accent:    #F2EEE7;
    /* Sidebar/toast admin : fixes, ne suivent pas le thème jour/nuit
       (panneau interne, pas exposé aux visiteurs) */
    --admin-dark:      #1a1a18;
    --admin-dark-text: #f5f2ed;
  }
  [data-theme="dark"] {
    --bg:      #111010;
    --bg-rgb:  17,16,16;
    --ink:     #F2EEE7;
    --ink-rgb: 242,238,231;
    --surface: #1a1a18;
  }
  body { background: var(--bg); color: var(--ink); font-family: 'DM Sans', sans-serif; font-weight: 300; -webkit-font-smoothing: antialiased; min-height: 100vh; }

  /* LAYOUT */
  .admin-wrap { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }

  /* SIDEBAR — fond fixe, ne change pas avec le thème (voir --admin-dark) */
  .sidebar { background: var(--admin-dark); padding: 32px 24px; position: sticky; top: 0; height: 100vh; overflow-y: auto; display: flex; flex-direction: column; }
  .sidebar-logo-img { height: 52px; width: auto; margin-bottom: 8px; }
  .sidebar-sub { font-family: 'Space Mono', monospace; font-size: .58rem; letter-spacing: .14em; text-transform: uppercase; color: var(--sand); margin-bottom: 40px; }
  .btn-new { width: 100%; background: var(--accent); color: var(--on-accent); border: none; padding: 14px; font-family: 'Space Mono', monospace; font-size: .65rem; letter-spacing: .14em; text-transform: uppercase; cursor: pointer; transition: opacity .2s; margin-bottom: 32px; }
  .btn-new:hover { opacity: .85; }
  .sidebar-section { font-family: 'Space Mono', monospace; font-size: .55rem; letter-spacing: .18em; text-transform: uppercase; color: var(--sand); opacity: .6; margin-bottom: 12px; }
  .article-list { flex: 1; }
  .article-item { padding: 14px 16px; cursor: pointer; border-radius: 2px; margin-bottom: 2px; transition: background .2s; border-left: 2px solid transparent; }
  .article-item:hover { background: rgba(255,255,255,.06); }
  .article-item.active { background: rgba(255,255,255,.08); border-left-color: var(--accent); }
  .article-item-title { font-size: .88rem; color: var(--admin-dark-text); line-height: 1.3; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .article-item-meta { font-family: 'Space Mono', monospace; font-size: .56rem; color: var(--sand); opacity: .6; }
  .article-item-status { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 6px; }
  .article-item-status.published { background: #4caf50; }
  .article-item-status.draft { background: var(--sand); }
  .sidebar-footer { margin-top: auto; padding-top: 24px; border-top: 1px solid rgba(255,255,255,.08); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .sidebar-footer a { font-family: 'Space Mono', monospace; font-size: .58rem; letter-spacing: .1em; text-transform: uppercase; color: var(--sand); opacity: .5; text-decoration: none; transition: opacity .2s; }
  .sidebar-footer a:hover { opacity: 1; }
  /* Le bouton reste sur la sidebar (fond fixe, toujours sombre) : styles fixes,
     ne pas utiliser --ink ici (il changerait de couleur avec le thème et
     deviendrait invisible en mode jour). */
  .theme-toggle {
    display: flex; align-items: center; justify-content: center;
    width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
    border: 1px solid rgba(245,242,237,.2);
    background: transparent; color: var(--admin-dark-text);
    cursor: pointer; transition: border-color .2s, background .2s;
  }
  .theme-toggle:hover { border-color: rgba(245,242,237,.45); background: rgba(245,242,237,.06); }
  .theme-toggle svg { width: 13px; height: 13px; }
  .theme-toggle .icon-sun { display: none; }
  [data-theme="dark"] .theme-toggle .icon-sun { display: block; }
  [data-theme="dark"] .theme-toggle .icon-moon { display: none; }

  /* TABS */
  .admin-tabs { display: flex; gap: 2px; margin-bottom: 28px; background: rgba(255,255,255,.06); padding: 3px; border-radius: 2px; }
  .admin-tab { flex: 1; background: none; border: none; padding: 10px 8px; font-family: 'Space Mono', monospace; font-size: .58rem; letter-spacing: .1em; text-transform: uppercase; color: var(--sand); opacity: .55; cursor: pointer; transition: all .2s; border-radius: 1px; }
  .admin-tab:hover { opacity: .85; }
  .admin-tab.active { background: var(--accent); color: var(--on-accent); opacity: 1; }

  /* HORAIRES FORM */
  .horaires-item { padding: 14px 16px; cursor: pointer; border-radius: 2px; margin-bottom: 2px; transition: background .2s; border-left: 2px solid transparent; }
  .horaires-item:hover { background: rgba(255,255,255,.06); }
  .horaires-item.active { background: rgba(255,255,255,.08); border-left-color: var(--accent); }
  .horaires-item-title { font-size: .88rem; color: var(--admin-dark-text); text-transform: capitalize; }
  .horaires-item-meta { font-family: 'Space Mono', monospace; font-size: .56rem; color: var(--sand); opacity: .6; margin-top: 4px; }

  .day-row { padding: 16px 0; border-bottom: 1px solid rgba(var(--ink-rgb),.08); }
  .day-row:last-child { border-bottom: none; }
  .day-row-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .day-row-label { font-family: 'DM Sans', sans-serif; font-size: .95rem; color: var(--ink); font-weight: 400; }
  .day-row-closed { display: flex; align-items: center; gap: 8px; white-space: nowrap; }
  .day-row-closed label { font-size: .68rem; text-transform: none; letter-spacing: 0; opacity: .7; cursor: pointer; }
  .day-row-closed input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; accent-color: var(--red); }
  .day-row-slots { display: flex; flex-direction: column; gap: 8px; }
  .day-row-slots input[type=text] { margin: 0; }
  .btn-slot2-toggle, .btn-slot2-remove { align-self: flex-start; background: none; border: none; font-family: 'Space Mono', monospace; font-size: .6rem; letter-spacing: .06em; text-transform: uppercase; color: var(--accent); opacity: .7; cursor: pointer; padding: 4px 0; transition: opacity .2s; }
  .btn-slot2-toggle:hover, .btn-slot2-remove:hover { opacity: 1; }
  .btn-slot2-remove { color: var(--red); }
  .horaires-card { background: var(--surface); border: 1px solid rgba(var(--ink-rgb),.1); padding: 8px 28px; margin-top: 8px; }
  .month-picker-row { display: flex; align-items: flex-end; gap: 16px; margin-bottom: 24px; }
  .month-picker-row .form-group { flex: 0 0 220px; }

  /* MAIN */
  .main { padding: 48px; }
  .main-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 40px; }
  .main-title { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 300; }
  .main-actions { display: flex; gap: 12px; }

  /* BUTTONS */
  .btn { font-family: 'Space Mono', monospace; font-size: .62rem; letter-spacing: .12em; text-transform: uppercase; padding: 12px 24px; border: none; cursor: pointer; transition: all .2s; }
  .btn-save { background: var(--accent); color: var(--on-accent); }
  .btn-save:hover { opacity: .85; }
  .btn-publish { background: var(--accent); color: var(--on-accent); }
  .btn-publish:hover { opacity: .8; }
  .btn-delete { background: none; color: var(--red); border: 1px solid var(--red); }
  .btn-delete:hover { background: var(--red); color: white; }
  .btn-share-fb { background: #1877f2; color: white; }
  .btn-share-fb:hover { opacity: .85; }
  .btn-share-ig { background: #c13584; color: white; }
  .btn-share-ig:hover { opacity: .85; }

  /* FORM */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px; }
  .section-block { margin-bottom: 44px; padding-bottom: 36px; border-bottom: 1px solid rgba(var(--ink-rgb),.1); }
  .section-block:last-of-type { border-bottom: none; }
  .section-block-title { font-family: 'Space Mono', monospace; font-size: .62rem; letter-spacing: .16em; text-transform: uppercase; opacity: .55; margin-bottom: 20px; }
  .form-group { display: flex; flex-direction: column; gap: 8px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-family: 'Space Mono', monospace; font-size: .58rem; letter-spacing: .14em; text-transform: uppercase; color: var(--ink); opacity: .6; }
  input, select, textarea { background: var(--surface); border: 1px solid rgba(var(--ink-rgb),.15); padding: 12px 16px; font-family: 'DM Sans', sans-serif; font-size: .9rem; color: var(--ink); outline: none; transition: border-color .2s; width: 100%; }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: vertical; line-height: 1.7; }
  .textarea-contenu { min-height: 320px; font-size: .88rem; }
  .field-hint { font-size: .75rem; color: var(--ink); opacity: .45; margin-top: 4px; }
  .checkbox-group { display: flex; align-items: center; gap: 10px; padding: 12px 0; }
  .checkbox-group input[type=checkbox] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--accent); }
  .checkbox-group label { font-family: 'DM Sans', sans-serif; font-size: .88rem; text-transform: none; letter-spacing: 0; opacity: 1; cursor: pointer; }

  /* PREVIEW */
  .preview-img { width: 100%; height: 200px; object-fit: cover; background: var(--admin-dark); display: block; margin-top: 8px; }
  .preview-img-empty { width: 100%; height: 100px; background: rgba(var(--ink-rgb),.06); display: flex; align-items: center; justify-content: center; margin-top: 8px; }
  .preview-img-empty span { font-family: 'Space Mono', monospace; font-size: .6rem; color: var(--ink); opacity: .35; }

  /* SHARE SECTION */
  .share-section { background: var(--surface); border: 1px solid rgba(var(--ink-rgb),.1); padding: 28px; margin-top: 32px; }
  .share-title { font-family: 'Space Mono', monospace; font-size: .6rem; letter-spacing: .16em; text-transform: uppercase; color: var(--ink); opacity: .5; margin-bottom: 16px; }
  .share-btns { display: flex; gap: 12px; flex-wrap: wrap; }

  /* EMPTY STATE */
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; gap: 16px; opacity: .4; }
  .empty-state p { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-style: italic; }

  /* TOAST */
  .toast { position: fixed; bottom: 32px; right: 32px; background: var(--admin-dark); color: var(--admin-dark-text); padding: 14px 24px; font-family: 'Space Mono', monospace; font-size: .65rem; letter-spacing: .1em; opacity: 0; transform: translateY(10px); transition: all .3s; pointer-events: none; z-index: 999; }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.success { border-left: 3px solid #4caf50; }
  .toast.error { border-left: 3px solid var(--red); }

  .divider { border: none; border-top: 1px solid rgba(var(--ink-rgb),.1); margin: 32px 0; }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    .admin-wrap { grid-template-columns: 1fr; }
    .sidebar { position: relative; height: auto; max-height: 280px; }
    .main { padding: 28px 20px; }
    .main-header { flex-direction: column; align-items: flex-start; gap: 16px; }
    .main-actions { flex-wrap: wrap; width: 100%; }
    .main-actions .btn { flex: 1; min-width: 120px; }
    .form-grid { grid-template-columns: 1fr; gap: 18px; }
    .share-btns { flex-direction: column; }
    .share-btns .btn { width: 100%; }
    .day-row { padding: 14px 0; }
    .day-row-top { flex-wrap: wrap; gap: 8px; }
    .horaires-card { padding: 8px 18px; }
    .month-picker-row { flex-direction: column; align-items: stretch; }
  }
  @media (max-width: 480px) {
    .sidebar { max-height: 220px; padding: 24px 16px; }
    .main { padding: 20px 14px; }
    .main-title { font-size: 1.5rem; }
  }
</style>
</head>
<body>

<div class="admin-wrap">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <img src="img/brume-logo-white.svg" alt="Brüme" class="sidebar-logo-img" />
    <div class="sidebar-sub">Admin</div>

    <div class="admin-tabs">
      <button id="tab-articles" class="admin-tab active" onclick="switchTab('articles')">Éditions</button>
      <button id="tab-horaires" class="admin-tab" onclick="switchTab('horaires')">Horaires</button>
      <button id="tab-accueil" class="admin-tab" onclick="switchTab('accueil')">Accueil</button>
    </div>

    <!-- ONGLET ARTICLES -->
    <div id="panel-articles">
      <button class="btn-new" onclick="newArticle()">+ Nouvel article</button>
      <div class="sidebar-section">Articles</div>
      <div class="article-list" id="article-list">
        <div style="font-family:'Space Mono',monospace;font-size:.6rem;color:var(--sand);opacity:.4;padding:12px 0;">Chargement…</div>
      </div>
    </div>

    <!-- ONGLET HORAIRES -->
    <div id="panel-horaires" style="display:none;">
      <button class="btn-new" onclick="newHorairesMonth()">+ Nouveau mois</button>
      <div class="sidebar-section">Mois enregistrés</div>
      <div class="article-list" id="horaires-list">
        <div style="font-family:'Space Mono',monospace;font-size:.6rem;color:var(--sand);opacity:.4;padding:12px 0;">Chargement…</div>
      </div>
    </div>

    <!-- ONGLET ACCUEIL -->
    <div id="panel-accueil" style="display:none;">
      <div class="sidebar-section">Page d'accueil</div>
      <div style="font-family:'Space Mono',monospace;font-size:.6rem;color:var(--sand);opacity:.5;line-height:1.6;padding:4px 0 12px;">
        Le texte et les images des sections « Hero » et « Notre histoire » de la page d'accueil.
      </div>
    </div>

    <div class="sidebar-footer">
      <a href="editions.html" target="_blank">↗ Voir le site</a>
      <button class="theme-toggle" id="theme-toggle" aria-label="Changer de thème jour/nuit">
        <svg class="icon-moon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
        </svg>
        <svg class="icon-sun" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
        </svg>
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="main">
    <div class="empty-state">
      <p>Sélectionnez un article ou créez-en un nouveau.</p>
    </div>
  </main>

</div>

<div class="toast" id="toast"></div>

<script src="js/cms.js"></script>
<script src="js/theme.js"></script>
<script>
let currentId = null
let articles = []
let currentTab = 'articles'
let currentHorairesId = null
let horairesEntries = []
let currentAccueilId = null

// ── INIT ──
;(async () => {
  if (!checkAuth()) return
  await loadList()
})()

// ── ONGLETS ──
function switchTab(tab) {
  currentTab = tab
  document.getElementById('tab-articles').classList.toggle('active', tab === 'articles')
  document.getElementById('tab-horaires').classList.toggle('active', tab === 'horaires')
  document.getElementById('tab-accueil').classList.toggle('active', tab === 'accueil')
  document.getElementById('panel-articles').style.display = tab === 'articles' ? '' : 'none'
  document.getElementById('panel-horaires').style.display = tab === 'horaires' ? '' : 'none'
  document.getElementById('panel-accueil').style.display = tab === 'accueil' ? '' : 'none'

  if (tab === 'articles') {
    if (!currentId) document.getElementById('main').innerHTML = `<div class="empty-state"><p>Sélectionnez un article ou créez-en un nouveau.</p></div>`
  } else if (tab === 'horaires') {
    loadHorairesList()
  } else if (tab === 'accueil') {
    loadAccueilForm()
  }
}

async function loadList() {
  try {
    articles = await getAllArticles()
    renderList()
  } catch(e) {
    document.getElementById('article-list').innerHTML =
      '<div style="color:var(--red);font-size:.7rem;padding:8px">Erreur de connexion Airtable</div>'
  }
}

function renderList() {
  const el = document.getElementById('article-list')
  if (!articles.length) {
    el.innerHTML = '<div style="font-family:\'Space Mono\',monospace;font-size:.6rem;color:var(--sand);opacity:.4;padding:12px 0">Aucun article</div>'
    return
  }
  el.innerHTML = articles.map(a => `
    <div class="article-item ${a.id === currentId ? 'active' : ''}" onclick="editArticle('${a.id}')">
      <div class="article-item-title">${a.titre || 'Sans titre'}</div>
      <div class="article-item-meta">
        <span class="article-item-status ${a.publie ? 'published' : 'draft'}"></span>
        ${a.publie ? 'Publié' : 'Brouillon'} · ${a.date_publication ? new Date(a.date_publication).toLocaleDateString('fr-FR') : '—'}
      </div>
    </div>`).join('')
}

// ── NOUVEAU ARTICLE ──
function newArticle() {
  currentId = null
  renderForm({})
  document.querySelectorAll('.article-item').forEach(el => el.classList.remove('active'))
}

// ── ÉDITER ARTICLE ──
async function editArticle(id) {
  currentId = id
  const a = articles.find(x => x.id === id)
  renderForm(a)
  renderList()
}

// ── FORMULAIRE ──
function renderForm(a) {
  const isNew = !a.id
  const url = a.id ? articleUrl(a.id) : ''

  document.getElementById('main').innerHTML = `
    <div class="main-header">
      <h1 class="main-title">${isNew ? 'Nouvel article' : 'Modifier l\'article'}</h1>
      <div class="main-actions">
        ${!isNew ? `<button class="btn btn-delete" onclick="confirmDelete('${a.id}')">Supprimer</button>` : ''}
        <button class="btn btn-save" onclick="saveForm(false)">Enregistrer brouillon</button>
        <button class="btn btn-publish" onclick="saveForm(true)">Publier</button>
      </div>
    </div>

    <div class="form-grid">
      <div class="form-group full">
        <label>Titre *</label>
        <input id="f-titre" type="text" value="${esc(a.titre)}" placeholder="Le titre de l'article">
      </div>
      <div class="form-group">
        <label>Catégorie</label>
        <select id="f-categorie">
          ${['Portrait','Matières','Espace','Papeterie','Cuisine','Sélection'].map(c =>
            `<option value="${c}" ${a.categorie === c ? 'selected' : ''}>${c}</option>`
          ).join('')}
        </select>
      </div>
      <div class="form-group">
        <label>Date de publication</label>
        <input id="f-date" type="date" value="${a.date_publication ? a.date_publication.slice(0,10) : today()}">
      </div>
      <div class="form-group">
        <label>Auteur</label>
        <input id="f-auteur" type="text" value="${esc(a.auteur) || 'Brüme'}">
      </div>
      <div class="form-group">
        <label>Image principale</label>
        <input id="f-image-file" type="file" accept="image/*" onchange="handleImageUpload(this)">
        <input type="hidden" id="f-image" value="${esc(a.image_url)}">
        <div id="img-preview">
          ${a.image_url
            ? `<img class="preview-img" src="${esc(a.image_url)}" onerror="this.style.display='none'">`
            : `<div class="preview-img-empty"><span>Aucune image</span></div>`}
        </div>
        <span class="field-hint" id="upload-status"></span>
      </div>
      <div class="form-group full">
        <label>Chapeau *</label>
        <textarea id="f-chapeau" rows="3" placeholder="1 à 3 phrases d'accroche affichées sous le titre…">${esc(a.chapeau)}</textarea>
      </div>
      <div class="form-group full">
        <label>Contenu de l'article</label>
        <textarea id="f-contenu" class="textarea-contenu" placeholder="Écrire ici le contenu de l'article.

Pour un titre de section, commencer la ligne par ## (exemple : ## Mon titre)

Laisser une ligne vide entre chaque paragraphe.">${esc(a.contenu)}</textarea>
        <span class="field-hint">## pour les titres de section · Laisser une ligne vide entre les paragraphes</span>
      </div>
      <div class="form-group full">
        <label>Produits Hiboutik liés</label>
        <input id="f-produits" type="text" value="${esc(a.produits_ids)}" placeholder="1042, 887, 1203">
        <span class="field-hint">Séparer les ID produits Hiboutik par des virgules</span>
      </div>
      <div class="form-group full">
        <label>Description SEO</label>
        <textarea id="f-seo" rows="2" placeholder="Optionnel — pour Google et les partages (150 caractères max)">${esc(a.seo_description)}</textarea>
      </div>
      <div class="form-group full">
        <div class="checkbox-group">
          <input type="checkbox" id="f-publie" ${a.publie ? 'checked' : ''}>
          <label for="f-publie">Article publié et visible sur le site</label>
        </div>
      </div>
    </div>

    ${!isNew ? `
    <hr class="divider">
    <div class="share-section">
      <div class="share-title">Partager sur les réseaux sociaux</div>
      <div class="share-btns">
        <button class="btn btn-share-fb" onclick="openSharePanel(getCurrentArticle(), '${url}')">Partager l'article</button>
      </div>
    </div>` : ''}
  `
}

// ── SAUVEGARDE ──
async function saveForm(publish) {
  const titre = document.getElementById('f-titre').value.trim()
  if (!titre) { showToast('Le titre est obligatoire', 'error'); return }

  const imageUrl = document.getElementById('f-image').value.trim()

  const fields = {
    titre,
    categorie:       document.getElementById('f-categorie').value,
    chapeau:         document.getElementById('f-chapeau').value.trim(),
    contenu:         document.getElementById('f-contenu').value.trim(),
    produits_ids:    document.getElementById('f-produits').value.trim(),
    auteur:          document.getElementById('f-auteur').value.trim() || 'Brüme',
    seo_description: document.getElementById('f-seo').value.trim(),
    date_publication: document.getElementById('f-date').value || today(),
    publie:          publish !== undefined ? publish : document.getElementById('f-publie').checked,
  }

  // Le champ Airtable "image" est un Attachment — il attend un tableau [{ url }]
  if (imageUrl) fields.image = [{ url: imageUrl }]

  try {
    const saved = await saveArticle(fields, currentId)
    if (!currentId) currentId = saved.id
    showToast(publish ? 'Article publié ✓' : 'Brouillon enregistré ✓', 'success')
    await loadList()
    renderList()
    // Mettre à jour le checkbox
    if (document.getElementById('f-publie')) {
      document.getElementById('f-publie').checked = fields.publie
    }
  } catch(e) {
    showToast('Erreur lors de la sauvegarde', 'error')
    console.error(e)
  }
}

async function confirmDelete(id) {

// ═════════════════════════════════════
// SECTION HORAIRES
// ═════════════════════════════════════

const MOIS_LABELS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre']

function currentMonthKey() {
  const d = new Date()
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`
}

function monthLabel(key) {
  if (!key || !key.includes('-')) return key || '—'
  const [y, m] = key.split('-')
  const idx = parseInt(m, 10) - 1
  return `${MOIS_LABELS[idx] || m} ${y}`
}

// ── CHARGER LA LISTE DES MOIS ──
async function loadHorairesList() {
  const el = document.getElementById('horaires-list')
  el.innerHTML = '<div style="font-family:\'Space Mono\',monospace;font-size:.6rem;color:var(--sand);opacity:.4;padding:12px 0;">Chargement…</div>'
  try {
    horairesEntries = await getAllHoraires()
    renderHorairesList()
    if (!currentHorairesId) {
      document.getElementById('main').innerHTML = `<div class="empty-state"><p>Sélectionnez un mois ou créez-en un nouveau.</p></div>`
    }
  } catch (e) {
    el.innerHTML = '<div style="color:var(--red);font-size:.7rem;padding:8px">Erreur de connexion Airtable</div>'
    console.error(e)
  }
}

function renderHorairesList() {
  const el = document.getElementById('horaires-list')
  if (!horairesEntries.length) {
    el.innerHTML = '<div style="font-family:\'Space Mono\',monospace;font-size:.6rem;color:var(--sand);opacity:.4;padding:12px 0">Aucun mois enregistré</div>'
    return
  }
  el.innerHTML = horairesEntries.map(h => `
    <div class="horaires-item ${h.id === currentHorairesId ? 'active' : ''}" onclick="editHorairesMonth('${h.id}')">
      <div class="horaires-item-title">${monthLabel(h.mois)}</div>
      <div class="horaires-item-meta">${h.jours.filter(j => j && !/ferm/i.test(j)).length} jour(s) ouvert(s)</div>
    </div>`).join('')
}

// ── NOUVEAU MOIS ──
function newHorairesMonth() {
  currentHorairesId = null
  renderHorairesForm({ mois: currentMonthKey(), jours: JOURS_SEMAINE.map(() => '') })
  document.querySelectorAll('.horaires-item').forEach(el => el.classList.remove('active'))
}

// ── ÉDITER UN MOIS ──
function editHorairesMonth(id) {
  currentHorairesId = id
  const h = horairesEntries.find(x => x.id === id)
  renderHorairesForm(h)
  renderHorairesList()
}

// ── FORMULAIRE ──
function renderHorairesForm(h) {
  const isNew = !h.id

  document.getElementById('main').innerHTML = `
    <div class="main-header">
      <h1 class="main-title">${isNew ? 'Nouveaux horaires' : `Horaires — ${monthLabel(h.mois)}`}</h1>
      <div class="main-actions">
        ${!isNew ? `<button class="btn btn-delete" onclick="confirmDeleteHoraires('${h.id}')">Supprimer</button>` : ''}
        <button class="btn btn-save" onclick="saveHorairesForm()">Enregistrer</button>
      </div>
    </div>

    <div class="month-picker-row">
      <div class="form-group">
        <label>Mois concerné</label>
        <input id="h-mois" type="month" value="${h.mois || currentMonthKey()}">
      </div>
      <span class="field-hint" style="padding-bottom:10px;">Un jeu d'horaires distinct par mois — utile pour les horaires d'été, les fêtes, etc.</span>
    </div>

    <div class="horaires-card">
      ${JOURS_SEMAINE.map((j, i) => {
        const value = h.jours[i] || ''
        const isClosed = !value || /ferm/i.test(value)
        const slots = parseDaySlots(value)
        const slot1 = slots[0] || ''
        const slot2 = slots[1] || ''
        const hasSecondSlot = !!slot2
        return `
        <div class="day-row" id="day-row-${j}">
          <div class="day-row-top">
            <span class="day-row-label">${JOURS_LABELS[j]}</span>
            <div class="day-row-closed">
              <input type="checkbox" id="h-closed-${j}" ${isClosed ? 'checked' : ''} onchange="toggleDayClosed('${j}')">
              <label for="h-closed-${j}">Fermé</label>
            </div>
          </div>
          <div class="day-row-slots" id="day-slots-${j}" style="${isClosed ? 'display:none;' : ''}">
            <input type="text" id="h-day-${j}-1" value="${esc(slot1)}" placeholder="ex : 11h – 19h" ${isClosed ? 'disabled' : ''}>
            <div id="day-slot2-${j}" style="${hasSecondSlot ? '' : 'display:none;'}">
              <input type="text" id="h-day-${j}-2" value="${esc(slot2)}" placeholder="ex : 14h – 19h" ${isClosed ? 'disabled' : ''}>
            </div>
            <button type="button" class="btn-slot2-toggle" id="btn-slot2-${j}" style="${hasSecondSlot ? 'display:none;' : ''}" onclick="addSecondSlot('${j}')">+ Coupure méridienne (2ᵉ créneau)</button>
            <button type="button" class="btn-slot2-remove" id="btn-slot2-remove-${j}" style="${hasSecondSlot ? '' : 'display:none;'}" onclick="removeSecondSlot('${j}')">Retirer le 2ᵉ créneau</button>
          </div>
        </div>`
      }).join('')}
    </div>
  `
}

function toggleDayClosed(j) {
  const checkbox = document.getElementById(`h-closed-${j}`)
  const closed = checkbox.checked
  document.getElementById(`day-slots-${j}`).style.display = closed ? 'none' : ''
  document.getElementById(`h-day-${j}-1`).disabled = closed
  const slot2Input = document.getElementById(`h-day-${j}-2`)
  if (slot2Input) slot2Input.disabled = closed
  if (closed) {
    document.getElementById(`h-day-${j}-1`).value = ''
    if (slot2Input) slot2Input.value = ''
  }
}

function addSecondSlot(j) {
  document.getElementById(`day-slot2-${j}`).style.display = ''
  document.getElementById(`btn-slot2-${j}`).style.display = 'none'
  document.getElementById(`btn-slot2-remove-${j}`).style.display = ''
  document.getElementById(`h-day-${j}-2`).focus()
}

function removeSecondSlot(j) {
  document.getElementById(`h-day-${j}-2`).value = ''
  document.getElementById(`day-slot2-${j}`).style.display = 'none'
  document.getElementById(`btn-slot2-${j}`).style.display = ''
  document.getElementById(`btn-slot2-remove-${j}`).style.display = 'none'
}

// ── SAUVEGARDE ──
async function saveHorairesForm() {
  const mois = document.getElementById('h-mois').value
  if (!mois) { showToast('Le mois est obligatoire', 'error'); return }

  const joursValues = JOURS_SEMAINE.map(j => {
    const closed = document.getElementById(`h-closed-${j}`).checked
    if (closed) return ''
    const slot1 = document.getElementById(`h-day-${j}-1`).value.trim()
    const slot2Input = document.getElementById(`h-day-${j}-2`)
    const slot2 = (slot2Input && document.getElementById(`day-slot2-${j}`).style.display !== 'none')
      ? slot2Input.value.trim() : ''
    return formatDaySlots(slot1, slot2)
  })

  // Empêcher les doublons : si un autre enregistrement existe déjà pour ce mois
  const duplicate = horairesEntries.find(h => h.mois === mois && h.id !== currentHorairesId)
  if (duplicate) {
    showToast('Ce mois a déjà des horaires enregistrés — modifiez-les directement', 'error')
    return
  }

  try {
    const saved = await saveHoraires(mois, joursValues, currentHorairesId)
    if (!currentHorairesId) currentHorairesId = saved.id
    showToast('Horaires enregistrés ✓', 'success')
    await loadHorairesList()
  } catch (e) {
    showToast('Erreur lors de la sauvegarde', 'error')
    console.error(e)
  }
}

async function confirmDeleteHoraires(id) {
  if (!confirm('Supprimer les horaires de ce mois définitivement ?')) return

    document.getElementById('main').innerHTML = `<div class="empty-state"><p>Horaires supprimés.</p></div>`

// Upload via imgbb (hébergement gratuit, clé API publique) — renvoie une URL
// directe stockée comme attachment Airtable. Pas de backend nécessaire.
// Note : Vercel Blob abandonné après instabilité de configuration OIDC/token.
const IMGBB_API_KEY = '4eb8b1eb9000ee637b390b2e6280ea2b'

// targetIds permet de réutiliser cette fonction pour plusieurs champs image
// sur un même formulaire (ex. page Accueil : image hero + image histoire).
async function handleImageUpload(input, targetIds = { hidden: 'f-image', preview: 'img-preview', status: 'upload-status' }) {
  const file = input.files[0]
  if (!file) return

  const status = document.getElementById(targetIds.status)
  if (status) status.textContent = 'Envoi en cours…'

  try {
    const base64 = await fileToBase64(file)
    const formData = new FormData()
    formData.append('image', base64.split(',')[1]) // retire le préfixe data:image/...;base64,

    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
      method: 'POST',
      body: formData,
    })
    const data = await res.json()

    if (data.success) {
      const url = data.data.url
      document.getElementById(targetIds.hidden).value = url
      previewImg(url, targetIds.preview)
      if (status) {
        status.textContent = 'Image envoyée ✓'
        setTimeout(() => status.textContent = '', 2000)
      }
    } else {
      throw new Error('Échec upload imgbb')
    }
  } catch (e) {
    if (status) status.textContent = 'Erreur lors de l\'envoi de l\'image'
    console.error(e)
  }
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader()
    reader.onload = () => resolve(reader.result)
    reader.onerror = reject
    reader.readAsDataURL(file)
  })
}

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast')
  t.textContent = msg
  t.className = `toast ${type} show`
  setTimeout(() => t.className = 'toast', 3000)
}

function esc(str) {
  if (!str) return ''
  return String(str).replace(/"/g, '&quot;').replace(/</g, '&lt;')
}

function today() {
  return new Date().toISOString().slice(0, 10)
}
