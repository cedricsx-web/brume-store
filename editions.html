<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<script>
  (function () {
    var KEY = 'brume-theme', stored = null;
    try { stored = localStorage.getItem(KEY); } catch (e) {}
    var theme = stored;
    if (!theme) {
      var h = new Date().getHours();
      theme = (h >= 20 || h < 7) ? 'dark' : 'light';
    }
    document.documentElement.setAttribute('data-theme', theme);
  })();
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrüMe — Éditions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --sand: #c8b89a;
    --bg:          #f5f2ed;
    --bg-rgb:      245,242,237;
    --ink:         #1a1a18;
    --ink-rgb:     26,26,24;
    --surface:     #e8e4dd;
    --accent:       #2E4A8C;
    --accent-hover: #24396D;
    --on-accent:    #F2EEE7;
  }
  [data-theme="dark"] {
    --bg:      #111010;
    --bg-rgb:  17,16,16;
    --ink:     #F2EEE7;
    --ink-rgb: 242,238,231;
    --surface: #1a1a18;
  }
  body { background: var(--bg); color: var(--ink); font-family: 'DM Sans', sans-serif; font-weight: 300; -webkit-font-smoothing: antialiased; }

  /* NAV */
  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 20px 40px; background: var(--bg); border-bottom: 1px solid rgba(var(--ink-rgb),.1); }
  .nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 400; letter-spacing: .12em; text-transform: uppercase; color: var(--ink); text-decoration: none; }
  .nav-links { display: flex; gap: 32px; }
  .nav-links a { font-family: 'Space Mono', monospace; font-size: .65rem; letter-spacing: .12em; text-transform: uppercase; color: var(--ink); text-decoration: none; opacity: .7; transition: opacity .2s; }
  .nav-links a:hover, .nav-links a.active { opacity: 1; color: var(--accent); }
  .cart-link { display: inline-flex; align-items: center; gap: 6px; }
  #cart-badge { background: var(--accent); color: var(--on-accent); font-size: .6rem; padding: 1px 6px; border-radius: 10px; display: none; }
  #cart-badge.visible { display: inline-block; }
  .theme-toggle {
    display: flex; align-items: center; justify-content: center;
    width: 30px; height: 30px; border-radius: 50%;
    border: 1px solid rgba(var(--ink-rgb),.2);
    background: transparent; color: var(--ink);
    cursor: pointer; transition: border-color .2s, background .2s;
  }
  .theme-toggle:hover { border-color: rgba(var(--ink-rgb),.45); background: rgba(var(--ink-rgb),.06); }
  .theme-toggle svg { width: 14px; height: 14px; }
  .theme-toggle .icon-sun { display: none; }
  [data-theme="dark"] .theme-toggle .icon-sun { display: block; }
  [data-theme="dark"] .theme-toggle .icon-moon { display: none; }

  /* HERO */
  .hero { padding: 120px 40px 60px; border-bottom: 1px solid rgba(var(--ink-rgb),.12); display: grid; grid-template-columns: 1fr 1fr; align-items: end; gap: 40px; }
  .eyebrow { font-family: 'Space Mono', monospace; font-size: .6rem; letter-spacing: .2em; text-transform: uppercase; color: var(--sand); margin-bottom: 20px; display: block; }
  .hero h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(3rem, 6vw, 5.5rem); font-weight: 300; line-height: 1.0; }
  .hero h1 em { font-style: normal; color: var(--sand); }
  .hero-desc { font-size: .9rem; line-height: 1.75; color: var(--ink); opacity: .75; max-width: 360px; }

  /* FEATURED */
  .featured { display: grid; grid-template-columns: 1fr 1fr; cursor: pointer; border-bottom: 1px solid rgba(var(--ink-rgb),.12); text-decoration: none; color: inherit; }
  .featured-img { height: 480px; background: var(--surface); overflow: hidden; position: relative; }
  .featured-img img { width: 100%; height: 100%; object-fit: cover; opacity: .85; transition: opacity .5s, transform .6s; }
  .featured:hover .featured-img img { opacity: 1; transform: scale(1.03); }
  .featured-tag { position: absolute; top: 28px; left: 28px; font-family: 'Space Mono', monospace; font-size: .58rem; letter-spacing: .18em; text-transform: uppercase; background: var(--accent); color: var(--on-accent); padding: 6px 14px; }
  .featured-body { padding: 60px 56px; display: flex; flex-direction: column; justify-content: space-between; background: var(--surface); }
  .featured-meta { font-family: 'Space Mono', monospace; font-size: .58rem; letter-spacing: .14em; text-transform: uppercase; color: var(--sand); }
  .featured-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.8rem, 2.8vw, 2.6rem); font-weight: 300; line-height: 1.15; margin: 24px 0 20px; }
  .featured-title em { font-style: italic; }
  .featured-excerpt { font-size: .88rem; line-height: 1.8; color: var(--ink); opacity: .75; flex-grow: 1; margin-bottom: 40px; }
  .featured-cta { font-family: 'Space Mono', monospace; font-size: .62rem; letter-spacing: .15em; text-transform: uppercase; color: var(--accent); display: inline-flex; align-items: center; gap: 12px; transition: gap .2s; }
  .featured-cta::after { content: '→'; }
  .featured:hover .featured-cta { gap: 20px; }

  /* GRID */
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); border-left: 1px solid rgba(var(--ink-rgb),.1); }
  .card { border-right: 1px solid rgba(var(--ink-rgb),.1); border-bottom: 1px solid rgba(var(--ink-rgb),.1); text-decoration: none; color: inherit; display: block; transition: background .25s; }
  .card:hover { background: var(--surface); }
  .card-img { height: 220px; overflow: hidden; background: var(--surface); }
  .card-img img { width: 100%; height: 100%; object-fit: cover; opacity: .8; transition: opacity .4s, transform .5s; }
  .card:hover .card-img img { opacity: 1; transform: scale(1.04); }
  .card-body { padding: 28px 32px 36px; }
  .card-tag { font-family: 'Space Mono', monospace; font-size: .56rem; letter-spacing: .16em; text-transform: uppercase; color: var(--sand); margin-bottom: 14px; display: block; }
  .card-title { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 400; line-height: 1.2; margin-bottom: 10px; }
  .card-date { font-family: 'Space Mono', monospace; font-size: .56rem; letter-spacing: .1em; color: var(--ink); opacity: .45; margin-top: 20px; display: block; }

  /* EMPTY */
  .empty { padding: 100px 40px; text-align: center; }
  .empty p { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 300; font-style: italic; color: var(--ink); opacity: .5; }

  /* LOADING */
  .loading { padding: 100px 40px; text-align: center; }
  .loading-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--sand); margin: 0 4px; animation: pulse 1.2s ease-in-out infinite; }
  .loading-dot:nth-child(2) { animation-delay: .2s; }
  .loading-dot:nth-child(3) { animation-delay: .4s; }
  @keyframes pulse { 0%, 80%, 100% { opacity: .2; transform: scale(.8); } 40% { opacity: 1; transform: scale(1); } }

  @media (max-width: 768px) {
    nav { padding: 16px 20px; }
    .hero { grid-template-columns: 1fr; padding: 100px 20px 40px; }
    .featured { grid-template-columns: 1fr; }
    .featured-img { height: 300px; }
    .featured-body { padding: 32px 24px; }
    .grid { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 480px) {
    .grid { grid-template-columns: 1fr 1fr; gap: 0; }
    .card-img { height: 140px; }
    .card-body { padding: 16px 14px 20px; }
    .card-title { font-size: 1.05rem; }
    .featured-img { height: 220px; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">BrüMe</a>
  <div class="nav-links">
    <a href="index.html">Boutique</a>
    <a href="editions.html" class="active">Éditions</a>
    <a href="index.html#boutique" class="cart-link">Panier <span id="cart-badge"></span></a>
    <button class="theme-toggle" id="theme-toggle" aria-label="Changer de thème jour/nuit">
      <svg class="icon-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
      </svg>
      <svg class="icon-sun" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="4"/>
        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
      </svg>
    </button>
  </div>
</nav>

<section class="hero">
  <div>
    <span class="eyebrow" id="editions-eyebrow">BrüMe — Éditions</span>
    <h1 id="editions-titre">Objets,<br>créateurs,<br><em>matières</em>.</h1>
  </div>
  <p class="hero-desc" id="editions-description">Des textes sur les objets qui nous entourent, les designers qui les pensent, et la manière dont les choses bien faites s'inscrivent dans le quotidien.</p>
</section>

<div id="content">
  <div class="loading">
    <span class="loading-dot"></span>
    <span class="loading-dot"></span>
    <span class="loading-dot"></span>
  </div>
</div>

<script src="js/cms.js"></script>
<script src="js/theme.js"></script>
<script>
  // Badge panier (lit le localStorage partagé)
  (function () {
    const badge = document.getElementById('cart-badge')
    if (!badge) return
    const count = getLocalCartCount()
    badge.textContent = count
    badge.classList.toggle('visible', count > 0)
  })()
</script>
<script>
  // Charge le contenu de l'en-tête (eyebrow / titre / description) depuis
  // Airtable — champs partagés avec l'aperçu "Histoires" de l'accueil — et
  // l'injecte par-dessus le HTML statique. Si la config est vide ou en cas
  // d'erreur, le contenu HTML déjà présent dans la page reste affiché tel
  // quel (fallback).
  (async () => {
    try {
      const c = await getAccueil()
      if (!c) return

      const esc = (s) => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')

      const setText = (id, value) => {
        if (value == null || value === '') return
        const el = document.getElementById(id)
        if (el) el.textContent = value
      }

      // Reconstruit la mise en page à 3 lignes (dernière partie en or, comme
      // partout ailleurs sur le site) à partir d'un titre texte simple séparé
      // par des virgules — ex. "Objets, créateurs, matières" ->
      // "Objets,<br>créateurs,<br><em>matières</em>". Si le titre ne contient
      // pas 2 ou 3 parties, il s'affiche sur une seule ligne avec son dernier
      // mot en or.
      const setEditionsTitre = (id, value) => {
        if (!value) return
        const el = document.getElementById(id)
        if (!el) return
        const parts = value.split(',').map(s => s.trim()).filter(Boolean)
        if (parts.length === 3) {
          el.innerHTML = `${esc(parts[0])},<br>${esc(parts[1])},<br><em>${esc(parts[2])}</em>`
        } else if (parts.length === 2) {
          el.innerHTML = `${esc(parts[0])},<br><em>${esc(parts[1])}</em>`
        } else {
          const words = value.trim().split(' ')
          if (words.length <= 1) {
            el.innerHTML = `<em>${esc(value)}</em>`
          } else {
            const last = words.pop()
            el.innerHTML = `${esc(words.join(' '))} <em>${esc(last)}</em>`
          }
        }
      }

      setText('editions-eyebrow', c.editions_eyebrow)
      setEditionsTitre('editions-titre', c.editions_titre)
      setText('editions-description', c.editions_description)
    } catch (e) {
      console.error('Chargement de l\'en-tête Éditions:', e)
      // Silencieux : le HTML statique existant reste affiché.
    }
  })()
</script>
<script>
(async () => {
  try {
    const articles = await getArticles()
    const el = document.getElementById('content')

    if (!articles.length) {
      el.innerHTML = `<div class="empty"><p>Les premiers articles arrivent bientôt.</p></div>`
      return
    }

    const [first, ...rest] = articles

    // Article mis en avant
    const featured = `
      <a href="article.html?id=${first.id}" class="featured">
        <div class="featured-img">
          <img src="${first.image_url || 'img/editorial.jpg'}" alt="${first.titre}" onerror="this.src='img/editorial.jpg'">
          <span class="featured-tag">${first.categorie || 'Éditions'}</span>
        </div>
        <div class="featured-body">
          <span class="featured-meta">${formatDate(first.date_publication)}</span>
          <div>
            <h2 class="featured-title">${first.titre}</h2>
            <p class="featured-excerpt">${first.chapeau || ''}</p>
          </div>
          <span class="featured-cta">Lire l'article</span>
        </div>
      </a>`

    // Grille des autres articles
    const grid = rest.length ? `
      <div class="grid">
        ${rest.map(a => `
          <a href="article.html?id=${a.id}" class="card">
            <div class="card-img">
              <img src="${a.image_url || 'img/editorial.jpg'}" alt="${a.titre}" onerror="this.src='img/editorial.jpg'">
            </div>
            <div class="card-body">
              <span class="card-tag">${a.categorie || ''}</span>
              <h3 class="card-title">${a.titre}</h3>
              <span class="card-date">${formatDate(a.date_publication)}</span>
            </div>
          </a>`).join('')}
      </div>` : ''

    el.innerHTML = featured + grid

  } catch(e) {
    document.getElementById('content').innerHTML = `<div class="empty"><p>Impossible de charger les articles.</p></div>`
    console.error(e)
  }
})()
</script>
</body>
</html>
