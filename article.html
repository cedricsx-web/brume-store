<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<script>
  (function () {
    var KEY = 'brume-theme', stored = null;
    try { stored = localStorage.getItem(KEY); } catch (e) {}
    var theme = stored;
    if (!theme) {
      var h = new Date().getHours();
      theme = (h >= 20 || h < 7) ? 'dark' : 'light';
    }
    document.documentElement.setAttribute('data-theme', theme);
  })();
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrüMe — Article</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --sand: #c8b89a;
    --bg:          #f5f2ed;
    --bg-rgb:      245,242,237;
    --ink:         #1a1a18;
    --ink-rgb:     26,26,24;
    --surface:     #e8e4dd;
    --surface-2:   #ddd4bf;
    --accent:       #2E4A8C;
    --accent-hover: #24396D;
    --on-accent:    #F2EEE7;
  }
  [data-theme="dark"] {
    --bg:        #111010;
    --bg-rgb:    17,16,16;
    --ink:       #F2EEE7;
    --ink-rgb:   242,238,231;
    --surface:   #1a1a18;
    --surface-2: #161514;
  }
  body { background: var(--bg); color: var(--ink); font-family: 'DM Sans', sans-serif; font-weight: 300; -webkit-font-smoothing: antialiased; }

  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 20px 40px; background: var(--bg); border-bottom: 1px solid rgba(var(--ink-rgb),.1); }
  .nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 400; letter-spacing: .12em; text-transform: uppercase; color: var(--ink); text-decoration: none; }
  .nav-links { display: flex; gap: 32px; }
  .nav-links a { font-family: 'Space Mono', monospace; font-size: .65rem; letter-spacing: .12em; text-transform: uppercase; color: var(--ink); text-decoration: none; opacity: .7; transition: opacity .2s; }
  .nav-links a:hover { opacity: 1; }
  .cart-link { display: inline-flex; align-items: center; gap: 6px; }
  #cart-badge { background: var(--accent); color: var(--on-accent); font-size: .6rem; padding: 1px 6px; border-radius: 10px; display: none; }
  #cart-badge.visible { display: inline-block; }
  .theme-toggle {
    display: flex; align-items: center; justify-content: center;
    width: 30px; height: 30px; border-radius: 50%;
    border: 1px solid rgba(var(--ink-rgb),.2);
    background: transparent; color: var(--ink);
    cursor: pointer; transition: border-color .2s, background .2s;
  }
  .theme-toggle:hover { border-color: rgba(var(--ink-rgb),.45); background: rgba(var(--ink-rgb),.06); }
  .theme-toggle svg { width: 14px; height: 14px; }
  .theme-toggle .icon-sun { display: none; }
  [data-theme="dark"] .theme-toggle .icon-sun { display: block; }
  [data-theme="dark"] .theme-toggle .icon-moon { display: none; }

  .article-header { padding: 100px 40px 0; max-width: 820px; margin: 0 auto; }
  .back { display: inline-flex; align-items: center; gap: 10px; font-family: 'Space Mono', monospace; font-size: .6rem; letter-spacing: .14em; text-transform: uppercase; color: var(--ink); opacity: .5; text-decoration: none; margin-bottom: 48px; display: block; transition: opacity .2s; }
  .back:hover { opacity: 1; }
  .article-cat { font-family: 'Space Mono', monospace; font-size: .6rem; letter-spacing: .18em; text-transform: uppercase; color: var(--accent); margin-bottom: 20px; display: block; }
  .article-h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.2rem, 5vw, 4rem); font-weight: 300; line-height: 1.08; margin-bottom: 32px; }
  .byline { display: flex; align-items: center; justify-content: space-between; padding: 20px 0; border-top: 1px solid rgba(var(--ink-rgb),.12); border-bottom: 1px solid rgba(var(--ink-rgb),.12); }
  .byline-left { display: flex; align-items: center; gap: 16px; }
  .byline-avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--sand); display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; color: var(--on-accent); flex-shrink: 0; }
  .byline-name { font-size: .85rem; font-weight: 500; }
  .byline-date { font-family: 'Space Mono', monospace; font-size: .56rem; letter-spacing: .1em; color: var(--ink); opacity: .5; margin-top: 3px; }

  /* Share buttons */
  .share-btns { display: flex; gap: 10px; }
  .share-btn { font-family: 'Space Mono', monospace; font-size: .56rem; letter-spacing: .1em; text-transform: uppercase; padding: 8px 16px; border: 1px solid rgba(var(--ink-rgb),.2); background: none; cursor: pointer; transition: all .2s; color: var(--ink); }
  .share-btn:hover { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .share-btn.fb { border-color: #1877f2; color: #1877f2; }
  .share-btn.fb:hover { background: #1877f2; color: white; }
  .share-btn.ig { border-color: #c13584; color: #c13584; }
  .share-btn.ig:hover { background: #c13584; color: white; }

  .article-cover { width: 100%; height: clamp(280px, 45vw, 520px); overflow: hidden; background: var(--surface); }
  .article-cover img { width: 100%; height: 100%; object-fit: cover; opacity: .9; }

  .article-body { max-width: 680px; margin: 0 auto; padding: 64px 40px 80px; }
  .article-lead { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 300; font-style: italic; line-height: 1.65; color: var(--ink); margin-bottom: 48px; padding-bottom: 48px; border-bottom: 1px solid rgba(var(--ink-rgb),.1); }
  .article-body p { font-size: .95rem; line-height: 1.9; color: var(--ink); margin-bottom: 28px; opacity: .85; }
  .article-body h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 400; margin: 52px 0 18px; line-height: 1.2; }

  /* Related products */
  .related { background: var(--surface); padding: 72px 40px; }
  .related-label { font-family: 'Space Mono', monospace; font-size: .6rem; letter-spacing: .2em; text-transform: uppercase; color: var(--sand); margin-bottom: 40px; display: block; }
  .related-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; max-width: 960px; }
  .related-item { background: var(--surface-2); padding: 24px; transition: background .25s; display: block; }
  .related-item:hover { background: var(--bg); }
  .related-item-img { width: 100%; aspect-ratio: 1; background: var(--surface-2); overflow: hidden; margin-bottom: 16px; }
  .related-item-img img { width: 100%; height: 100%; object-fit: cover; opacity: .85; }
  .related-item-name { font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 300; color: var(--ink); margin-bottom: 14px; }
  .related-add-btn {
    width: 100%; padding: 10px 14px; background: none;
    border: 1px solid rgba(var(--ink-rgb),.25); color: var(--ink);
    font-family: 'Space Mono', monospace; font-size: .56rem; letter-spacing: .1em; text-transform: uppercase;
    cursor: pointer; transition: all .2s;
  }
  .related-add-btn:hover { background: var(--accent); border-color: var(--accent); color: var(--on-accent); }
  .related-add-btn.added { background: var(--accent); border-color: var(--accent); color: var(--on-accent); }
  .related-note { font-family: 'DM Sans', sans-serif; font-size: .75rem; color: var(--sand); opacity: .7; margin-top: 28px; max-width: 960px; }
  .related-item-price { font-family: 'Space Mono', monospace; font-size: .62rem; color: var(--sand); }
  .related-cta { display: inline-block; margin-top: 40px; font-family: 'Space Mono', monospace; font-size: .62rem; letter-spacing: .15em; text-transform: uppercase; color: var(--ink); border: 1px solid rgba(var(--ink-rgb),.2); padding: 14px 28px; text-decoration: none; transition: all .25s; }
  .related-cta:hover { background: var(--accent); border-color: var(--accent); color: var(--on-accent); }

  .loading { padding: 100px 40px; text-align: center; }
  .loading-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--sand); margin: 0 4px; animation: pulse 1.2s ease-in-out infinite; }
  .loading-dot:nth-child(2) { animation-delay: .2s; }
  .loading-dot:nth-child(3) { animation-delay: .4s; }
  @keyframes pulse { 0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)} }

  /* ── PRODUCT MODAL (porté depuis index.html pour rester sur la page article) ── */
  #modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.7); z-index: 399; backdrop-filter: blur(4px);
  }
  #modal-overlay.active { display: block; }
  #product-modal {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%,-50%) scale(.95);
    width: min(900px, 94vw); max-height: 90vh; max-height: 90dvh;
    background: var(--surface-2); border: 1px solid rgba(var(--ink-rgb),.1);
    z-index: 400; display: none; flex-direction: column;
    overflow: hidden; transition: transform .25s ease, opacity .25s ease; opacity: 0;
  }
  #product-modal.open { display: flex; transform: translate(-50%,-50%) scale(1); opacity: 1; }
  .modal-close {
    position: absolute; top: 10px; right: 10px;
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.65);
    border: 1.5px solid rgba(255,255,255,0.5);
    border-radius: 50%;
    cursor: pointer; z-index: 10; padding: 0;
    transition: background 0.2s, border-color 0.2s;
  }
  .modal-close:hover { background: rgba(0,0,0,0.9); border-color: #fff; }
  .modal-inner { display: grid; grid-template-columns: 1fr 1fr; height: 100%; overflow-y: auto; }
  .modal-img-wrap { position: relative; aspect-ratio: 1; overflow: hidden; background: var(--surface); min-height: 300px; }
  .modal-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .modal-info { padding: 48px 40px; display: flex; flex-direction: column; justify-content: center; gap: 16px; overflow-y: auto; }
  .modal-brand { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: .14em; color: var(--sand); text-transform: uppercase; }
  .modal-name { font-family: 'Cormorant Garamond', serif; font-size: clamp(20px,2.5vw,30px); font-weight: 300; line-height: 1.2; color: var(--ink); }
  .modal-price { font-family: 'Space Mono', monospace; font-size: 16px; letter-spacing: .05em; color: var(--sand); }
  .modal-desc { font-size: 13.5px; line-height: 1.75; color: rgba(var(--ink-rgb),.55); flex: 1; overflow-y: auto; max-height: 240px; padding-right: 4px; }
  .modal-desc p { margin-bottom: 10px; }
  .modal-desc p:last-child { margin-bottom: 0; }
  .modal-desc ul { list-style: none; padding: 0; margin-bottom: 12px; }
  .modal-desc ul li { padding-left: 14px; position: relative; margin-bottom: 4px; color: rgba(var(--ink-rgb),.55); }
  .modal-desc ul li::before { content: '·'; position: absolute; left: 0; color: var(--sand); font-size: 16px; line-height: 1.4; }
  .modal-desc .desc-section { font-family: 'Space Mono', monospace; font-size: 9.5px; letter-spacing: .14em; text-transform: uppercase; color: var(--sand); margin-top: 18px; margin-bottom: 6px !important; }
  .modal-desc .desc-section:first-child { margin-top: 0; }
  .modal-desc .desc-empty { font-style: italic; opacity: .3; }
  .modal-add {
    width: 100%; padding: 15px; font-family: 'Space Mono', monospace; font-size: 12px; letter-spacing: .12em;
    text-transform: uppercase; background: var(--accent); color: var(--on-accent); border: none; cursor: pointer;
    display: flex; justify-content: center; align-items: center; transition: opacity .2s;
  }
  .modal-add:hover { opacity: .85; }
  .modal-add:disabled { background: #444; cursor: not-allowed; opacity: 1; }
  .modal-reassurance {
    display: flex; align-items: center; gap: 6px; font-family: 'Space Mono', monospace; font-size: 9px;
    letter-spacing: .1em; color: rgba(var(--ink-rgb),.25); text-transform: uppercase;
  }
  .reassurance-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--sand); flex-shrink: 0; }
  @media (max-width: 700px) {
    #product-modal { width: 94vw; max-height: 88vh; max-height: 88dvh; }
    .modal-inner { grid-template-columns: 1fr; }
    .modal-img-wrap { aspect-ratio: auto; width: 100%; min-height: 180px; max-height: 55vh; max-height: 55dvh; }
    .modal-img-wrap .modal-add { position: absolute; bottom: 0; left: 0; right: 0; z-index: 5; width: 100%; padding: 14px; background: rgba(45,74,62,0.88); backdrop-filter: blur(6px); border-radius: 0; }
    .modal-info { padding: 14px 20px 18px; gap: 6px; }
    .modal-name { font-size: 18px; }
    .modal-reassurance { display: none; }
    .modal-close { top: 8px; right: 8px; width: 28px; height: 28px; background: rgba(0,0,0,0.7); border: 1.5px solid rgba(255,255,255,0.6); }
  }

  /* ── PANIER (calque coulissant) ── */
  #cart-overlay {
    position: fixed; inset: 0; background: rgba(var(--ink-rgb),.5);
    opacity: 0; pointer-events: none; transition: opacity .3s; z-index: 998;
  }
  #cart-overlay.active { opacity: 1; pointer-events: auto; }

  #cart-panel {
    position: fixed; top: 0; right: 0; bottom: 0; width: 420px; max-width: 100vw;
    background: var(--bg); z-index: 999;
    transform: translateX(100%); transition: transform .35s cubic-bezier(.4,0,.2,1);
    display: flex; flex-direction: column;
    box-shadow: -8px 0 30px rgba(0,0,0,.15);
  }
  #cart-panel.open { transform: translateX(0); }

  .cart-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 24px 28px; border-bottom: 1px solid rgba(var(--ink-rgb),.1);
  }
  .cart-title { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 400; }
  .cart-close { background: none; border: none; font-size: 1.4rem; cursor: pointer; color: var(--ink); opacity: .5; transition: opacity .2s; line-height: 1; }
  .cart-close:hover { opacity: 1; }

  .cart-body { flex: 1; overflow-y: auto; padding: 16px 28px; }
  .cart-empty { text-align: center; padding: 80px 20px; opacity: .4; }
  .cart-empty-icon { font-size: 2rem; display: block; margin-bottom: 12px; }
  .cart-empty p { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; margin-bottom: 4px; }
  .cart-empty small { font-size: .75rem; }

  .cart-item-row {
    display: grid; grid-template-columns: 56px 1fr auto; gap: 14px;
    padding: 16px 0; border-bottom: 1px solid rgba(var(--ink-rgb),.08);
    align-items: center;
  }
  .cart-item-img { width: 56px; height: 56px; background: var(--surface); overflow: hidden; }
  .cart-item-img img { width: 100%; height: 100%; object-fit: cover; }
  .cart-item-name { font-size: .85rem; line-height: 1.3; margin-bottom: 6px; }
  .cart-item-price { font-family: 'Space Mono', monospace; font-size: .65rem; color: var(--sand); }
  .cart-item-qty { display: flex; align-items: center; gap: 8px; }
  .qty-btn { width: 22px; height: 22px; border: 1px solid rgba(var(--ink-rgb),.2); background: none; cursor: pointer; font-size: .8rem; line-height: 1; }
  .qty-btn:hover { background: rgba(var(--ink-rgb),.06); }
  .qty-val { font-family: 'Space Mono', monospace; font-size: .75rem; min-width: 16px; text-align: center; }
  .cart-item-remove { background: none; border: none; color: var(--ink); opacity: .4; cursor: pointer; font-size: .9rem; grid-column: 3; justify-self: end; margin-top: 4px; }
  .cart-item-remove:hover { opacity: 1; color: #c0392b; }

  .cart-footer { padding: 20px 28px 28px; border-top: 1px solid rgba(var(--ink-rgb),.1); }
  .cart-total-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .cart-total-label { font-family: 'Space Mono', monospace; font-size: .65rem; letter-spacing: .1em; text-transform: uppercase; opacity: .6; }
  .cart-total-amount { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; }
  .cart-redirect-notice { font-size: .72rem; color: var(--ink); opacity: .55; line-height: 1.5; margin-bottom: 16px; }
  .btn-checkout {
    width: 100%; padding: 14px; background: var(--accent); color: var(--on-accent); border: none;
    font-family: 'Space Mono', monospace; font-size: .65rem; letter-spacing: .1em; text-transform: uppercase;
    cursor: pointer; transition: opacity .2s;
  }
  .btn-checkout:hover { opacity: .85; }

  @media (max-width: 480px) {
    #cart-panel { width: 100vw; }
  }

  @media (max-width: 768px) {
    nav { padding: 16px 20px; }
    .article-header { padding: 90px 20px 0; }
    .article-body { padding: 40px 20px 60px; }
    .related-grid { grid-template-columns: 1fr 1fr; }
    .byline { flex-direction: column; align-items: flex-start; gap: 16px; }
  }
</style>
</head>
<body>

<!-- PRODUCT MODAL OVERLAY -->
<div id="modal-overlay" onclick="closeProductModal()"></div>

<!-- PRODUCT MODAL -->
<div id="product-modal" role="dialog" aria-modal="true">
  <button class="modal-close" onclick="closeProductModal()" aria-label="Fermer">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><line x1="2" y1="2" x2="12" y2="12"/><line x1="12" y1="2" x2="2" y2="12"/></svg>
  </button>
  <div class="modal-inner">
    <div class="modal-img-wrap">
      <img id="modal-img" src="" alt="" />
    </div>
    <div class="modal-info">
      <p id="modal-brand" class="modal-brand"></p>
      <h2 id="modal-name" class="modal-name"></h2>
      <p id="modal-price" class="modal-price"></p>
      <p id="modal-desc" class="modal-desc"></p>
      <button id="modal-add-btn" class="modal-add">Ajouter au panier</button>
      <div class="modal-reassurance">
        <div class="reassurance-dot"></div>
        Paiement sécurisé · Stripe · Géré par Hiboutik
      </div>
    </div>
  </div>
</div>

<nav>
  <a href="index.html" class="nav-logo">BrüMe</a>
  <div class="nav-links">
    <a href="index.html">Boutique</a>
    <a href="editions.html">Éditions</a>
    <a href="#" id="cart-link" class="cart-link" onclick="event.preventDefault(); openCartPanel()">Panier <span id="cart-badge"></span></a>
    <button class="theme-toggle" id="theme-toggle" aria-label="Changer de thème jour/nuit">
      <svg class="icon-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
      </svg>
      <svg class="icon-sun" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="4"/>
        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
      </svg>
    </button>
  </div>
</nav>

<div id="content">
  <div class="loading">
    <span class="loading-dot"></span>
    <span class="loading-dot"></span>
    <span class="loading-dot"></span>
  </div>
</div>

<!-- PANIER (calque coulissant, même logique que la boutique) -->
<div id="cart-overlay" onclick="closeCartPanel()"></div>
<div id="cart-panel" role="dialog" aria-label="Panier">
  <div class="cart-header">
    <h2 class="cart-title">Votre panier</h2>
    <button class="cart-close" onclick="closeCartPanel()" aria-label="Fermer">×</button>
  </div>
  <div id="cart-body" class="cart-body">
    <div class="cart-empty">
      <span class="cart-empty-icon">🛒</span>
      <p>Panier vide</p>
      <small>Ajoutez des produits pour commencer</small>
    </div>
  </div>
  <div id="cart-footer" class="cart-footer" style="display:none">
    <div class="cart-total-row">
      <span class="cart-total-label">Total</span>
      <span id="cart-total" class="cart-total-amount">0,00 €</span>
    </div>
    <p class="cart-redirect-notice">Votre panier sera transféré automatiquement vers la boutique pour le paiement.</p>
    <button id="checkout-btn" class="btn-checkout" onclick="checkoutFromArticle()">
      Commander — paiement sécurisé
    </button>
  </div>
</div>

<script src="js/cms.js"></script>
<script src="js/theme.js"></script>
<script>
(async () => {
  const params = new URLSearchParams(window.location.search)
  const id = params.get('id')
  if (!id) { window.location.href = 'editions.html'; return }

  try {
    const a = await getArticle(id)
    const url = articleUrl(id)

    // Meta SEO dynamiques
    document.title = `${a.titre} — Brüme Éditions`
    if (a.seo_description) {
      const meta = document.createElement('meta')
      meta.name = 'description'; meta.content = a.seo_description
      document.head.appendChild(meta)
    }

    // Produits liés
    let relatedHtml = ''
    if (a.produits_ids) {
      const ids = a.produits_ids.split(',').map(s => s.trim()).filter(Boolean)
      if (ids.length) {
        const items = ids.map(pid => `
          <div class="related-item" data-pid="${pid}">
            <a href="#" class="related-item-link" style="text-decoration:none;color:inherit;display:block;" onclick="event.preventDefault(); openProductModal('${pid}')">
              <div class="related-item-img">
                <img src="https://brumeconceptstore.hiboutik.com/myshop/images/?img=big_${pid}-1.jpg" alt="Produit ${pid}" onerror="this.style.display='none'">
              </div>
              <div class="related-item-name">Voir le produit #${pid}</div>
            </a>
            <button class="related-add-btn" onclick="addRelatedToCart('${pid}', this)">Ajouter au panier</button>
          </div>`).join('')

        relatedHtml = `
          <section class="related">
            <span class="related-label">Produits liés à cet article</span>
            <div class="related-grid">${items}</div>
            <p class="related-note">Les produits ajoutés rejoignent votre panier — retrouvez-les sur la boutique pour finaliser votre commande.</p>
          </section>`
      }
    }

    // Contenu formaté (retours à la ligne → paragraphes)
    const bodyHtml = (a.contenu || '')
      .split('\n\n')
      .filter(p => p.trim())
      .map(p => p.startsWith('## ')
        ? `<h2>${p.replace('## ', '')}</h2>`
        : `<p>${p.replace(/\n/g, '<br>')}</p>`)
      .join('')

    document.getElementById('content').innerHTML = `
      <header class="article-header">
        <a href="editions.html" class="back">← Retour aux éditions</a>
        <span class="article-cat">${a.categorie || 'Éditions'}</span>
        <h1 class="article-h1">${a.titre}</h1>
        <div class="byline">
          <div class="byline-left">
            <div class="byline-avatar">${(a.auteur || 'B')[0].toUpperCase()}</div>
            <div>
              <div class="byline-name">${a.auteur || 'Brüme'}</div>
              <div class="byline-date">${formatDate(a.date_publication)}</div>
            </div>
          </div>
          <div class="share-btns">
            <button class="share-btn" onclick="openSharePanel(window._article, '${url}')">Partager</button>
          </div>
        </div>
      </header>

      <div class="article-cover">
        <img src="${a.image_url || 'img/editorial.jpg'}" alt="${a.titre}" onerror="this.src='img/editorial.jpg'">
      </div>

      <div class="article-body">
        <p class="article-lead">${a.chapeau || ''}</p>
        ${bodyHtml}
      </div>

      ${relatedHtml}
    `

    window._article = a

    // Ouvre la modale produit si l'URL contient ?produit=ID (lien direct partagé)
    const productParam = params.get('produit')
    if (productParam) setTimeout(() => openProductModal(productParam), 300)

  } catch(e) {
    document.getElementById('content').innerHTML = `<div style="padding:100px 40px;text-align:center;font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-style:italic;opacity:.5">Article introuvable.</div>`
    console.error(e)
  }
})()

// Ajoute un produit lié au panier (localStorage partagé avec index.html)
// sans rediriger vers Hiboutik — la redirection n'arrive qu'au clic "Commander" du panier
function addRelatedToCart(productId, btn) {
  addToLocalCart(productId, 1)
  btn.textContent = 'Ajouté ✓'
  btn.classList.add('added')
  setTimeout(() => {
    btn.textContent = 'Ajouter au panier'
    btn.classList.remove('added')
  }, 1500)
  updateCartBadge()
}

// ── MODALE PRODUIT (reste sur la page article, ne redirige plus vers index.html) ──

function fmt(n) {
  return new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR' }).format(n)
}

const FALLBACK_GRADIENTS = [
  'linear-gradient(145deg,#E2D9CC,#C8BBA8)', 'linear-gradient(145deg,#CDD5D2,#A9B7B3)',
  'linear-gradient(145deg,#D9CFBF,#BFB09C)', 'linear-gradient(145deg,#E8E0D5,#D0C5B5)',
  'linear-gradient(145deg,#CCC4B8,#AFA598)', 'linear-gradient(145deg,#C8D0CC,#A8B5B0)',
  'linear-gradient(145deg,#D4CCB8,#BEB49E)', 'linear-gradient(145deg,#B8C4B0,#8BA882)',
]
function getFallbackGradient(id) {
  return FALLBACK_GRADIENTS[id % FALLBACK_GRADIENTS.length]
}

// Convertit une description Hiboutik en texte brut vers un HTML lisible
// (sections, listes à puces, paragraphes) — même logique que js/ui.js
function formatDescription(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(l => l)
  let html = ''
  let i = 0
  while (i < lines.length) {
    const line = lines[i]
    const nextLine = lines[i + 1] || ''
    const isHeader = line.length < 60
      && !line.startsWith('•') && !line.startsWith('-')
      && (nextLine.startsWith('•') || nextLine.startsWith('-') || nextLine.length > 40)
      && !line.endsWith('.')
    if (isHeader) {
      html += `<p class="desc-section">${line}</p>`
      i++
      continue
    }
    if (line.startsWith('•') || line.startsWith('-')) {
      let listItems = ''
      while (i < lines.length && (lines[i].startsWith('•') || lines[i].startsWith('-'))) {
        listItems += `<li>${lines[i].replace(/^[•-]\s*/, '')}</li>`
        i++
      }
      html += `<ul>${listItems}</ul>`
      continue
    }
    html += `<p>${line}</p>`
    i++
  }
  return html
}

let _productsCache = null
let _productsFetching = null

// Pre-fetch products in background so modal opens instantly
function _prefetchProducts() {
  if (!_productsFetching) {
    _productsFetching = fetch('/api/products')
      .then(r => r.json())
      .then(data => { _productsCache = data; return data; })
      .catch(() => null)
  }
  return _productsFetching
}
// Start pre-fetch as soon as CMS script loads
_prefetchProducts()

async function _getProductById(productId) {
  if (!_productsCache) await _prefetchProducts()
  return _productsCache
    ? _productsCache.find(p => String(p.product_id) === String(productId))
    : null
}

async function openProductModal(productId) {
  // Show loading state immediately
  document.getElementById('product-modal').classList.add('open')
  document.getElementById('modal-overlay').classList.add('active')
  document.body.style.overflow = 'hidden'
  document.getElementById('modal-name').textContent = 'Chargement…'
  document.getElementById('modal-brand').textContent = ''
  document.getElementById('modal-desc').innerHTML = ''
  document.getElementById('modal-price').textContent = ''
  document.getElementById('modal-img').src = ''

  const p = await _getProductById(productId)
  if (!p) {
    document.getElementById('modal-name').textContent = 'Produit introuvable'
    return
  }

  const price = parseFloat(p.product_price)
  const sale = p.product_discount_price ? parseFloat(p.product_discount_price) : null

  const img = document.getElementById('modal-img')
  img.src = `https://brumeconceptstore.hiboutik.com/myshop/images/?img=big_${p.product_id}-1.jpg`
  img.onerror = function () {
    this.style.display = 'none'
    document.querySelector('.modal-img-wrap').style.background = getFallbackGradient(p.product_id)
  }

  document.getElementById('modal-name').textContent = p.product_model
  document.getElementById('modal-brand').textContent = p.product_brand || ''

  // Champ corrigé : l'API renvoie products_desc (et non product_description)
  const rawDesc = p.products_desc || ''
  const modalDesc = document.getElementById('modal-desc')
  if (!rawDesc.trim()) {
    modalDesc.innerHTML = '<p class="desc-empty">Aucune description disponible.</p>'
  } else if (rawDesc.includes('<')) {
    modalDesc.innerHTML = rawDesc
  } else {
    modalDesc.innerHTML = formatDescription(rawDesc)
  }

  document.getElementById('modal-price').innerHTML = sale
    ? `<span style="text-decoration:line-through;opacity:.5;margin-right:8px;">${fmt(price)}</span>${fmt(sale)}`
    : fmt(price)

  const addBtn = document.getElementById('modal-add-btn')
  addBtn.disabled = false
  addBtn.textContent = 'Ajouter au panier'
  addBtn.onclick = () => {
    addToLocalCart(p.product_id, 1)
    addBtn.textContent = '✓ Ajouté !'
    setTimeout(() => { addBtn.textContent = 'Ajouter au panier' }, 1200)
    updateCartBadge()
    setTimeout(() => { closeProductModal(); openCartPanel() }, 300)
  }

  // Reflète le produit ouvert dans l'URL sans recharger la page
  const url = new URL(window.location)
  url.searchParams.set('produit', p.product_id)
  history.pushState({}, '', url)

  // Mobile: move add button onto image
  if (window.innerWidth <= 700) {
    const btn = document.getElementById('modal-add-btn')
    const imgWrap = document.querySelector('#product-modal .modal-img-wrap')
    if (btn && imgWrap && btn.parentNode !== imgWrap) imgWrap.appendChild(btn)
  }
}

function closeProductModal() {
  document.getElementById('product-modal').classList.remove('open')
  document.getElementById('modal-overlay').classList.remove('active')
  document.body.style.overflow = ''

  // Move add button back to modal-info for desktop
  var btn = document.getElementById('modal-add-btn')
  var info = document.querySelector('#product-modal .modal-info')
  var reassurance = document.querySelector('#product-modal .modal-reassurance')
  if (btn && info && btn.parentNode !== info) info.insertBefore(btn, reassurance)

  const url = new URL(window.location)
  url.searchParams.delete('produit')
  history.pushState({}, '', url)
}

function updateCartBadge() {
  const count = getLocalCartCount()
  const badge = document.getElementById('cart-badge')
  if (!badge) return
  badge.textContent = count
  badge.classList.toggle('visible', count > 0)
}
updateCartBadge()

// ── PANNEAU PANIER (calque coulissant) ──────────────
// Réutilise le même /api/products que la boutique pour récupérer
// nom/prix/image des produits stockés en localStorage (juste des IDs).

function openCartPanel() {
  document.getElementById('cart-panel').classList.add('open')
  document.getElementById('cart-overlay').classList.add('active')
  document.body.style.overflow = 'hidden'
  renderCartPanel()
}

function closeCartPanel() {
  document.getElementById('cart-panel').classList.remove('open')
  document.getElementById('cart-overlay').classList.remove('active')
  document.body.style.overflow = ''
}

async function getLocalCart() {
  try { return JSON.parse(localStorage.getItem('brume_cart') || '[]') } catch { return [] }
}

function setLocalCart(cart) {
  localStorage.setItem('brume_cart', JSON.stringify(cart))
}

async function renderCartPanel() {
  const body = document.getElementById('cart-body')
  const footer = document.getElementById('cart-footer')
  const cart = await getLocalCart()

  if (!cart.length) {
    body.innerHTML = `<div class="cart-empty"><span class="cart-empty-icon">🛒</span><p>Panier vide</p><small>Ajoutez des produits pour commencer</small></div>`
    footer.style.display = 'none'
    return
  }

  body.innerHTML = `<div style="text-align:center;padding:40px 0;font-family:'Space Mono',monospace;font-size:.65rem;opacity:.4">Chargement…</div>`

  try {
    const res = await fetch('/api/products')
    const allProducts = await res.json()

    const items = cart.map(({ product_id, qty }) => {
      const product = allProducts.find(p => String(p.product_id) === String(product_id))
      return product ? { product, qty } : null
    }).filter(Boolean)

    if (!items.length) {
      body.innerHTML = `<div class="cart-empty"><span class="cart-empty-icon">🛒</span><p>Panier vide</p><small>Ajoutez des produits pour commencer</small></div>`
      footer.style.display = 'none'
      return
    }

    body.innerHTML = items.map(({ product, qty }) => {
      const price = parseFloat(product.product_discount_price || product.product_price)
      return `
        <div class="cart-item-row" data-id="${product.product_id}">
          <a href="index.html?product=${product.product_id}" class="cart-item-img" style="display:block">
            <img src="https://brumeconceptstore.hiboutik.com/myshop/images/?img=big_${product.product_id}-1.jpg" alt="" onerror="this.style.display='none'">
          </a>
          <div>
            <a href="index.html?product=${product.product_id}" class="cart-item-name" style="text-decoration:none;color:inherit;display:block">${product.product_model || 'Produit #' + product.product_id}</a>
            <div class="cart-item-price">${fmtPrice(price * qty)}</div>
          </div>
          <div class="cart-item-qty">
            <button class="qty-btn" onclick="changeCartQty('${product.product_id}', -1)">−</button>
            <span class="qty-val">${qty}</span>
            <button class="qty-btn" onclick="changeCartQty('${product.product_id}', 1)">+</button>
          </div>
          <button class="cart-item-remove" onclick="removeCartItem('${product.product_id}')">×</button>
        </div>`
    }).join('')

    const total = items.reduce((sum, { product, qty }) => {
      const price = parseFloat(product.product_discount_price || product.product_price)
      return sum + price * qty
    }, 0)

    document.getElementById('cart-total').textContent = fmtPrice(total)
    footer.style.display = ''

  } catch (e) {
    body.innerHTML = `<div class="cart-empty"><p>Erreur de chargement du panier</p></div>`
    console.error(e)
  }
}

function fmtPrice(n) {
  return new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR' }).format(n)
}

async function changeCartQty(productId, delta) {
  const cart = await getLocalCart()
  const item = cart.find(i => String(i.product_id) === String(productId))
  if (!item) return
  item.qty += delta
  const updated = item.qty <= 0 ? cart.filter(i => String(i.product_id) !== String(productId)) : cart
  setLocalCart(updated)
  updateCartBadge()
  renderCartPanel()
}

async function removeCartItem(productId) {
  const cart = await getLocalCart()
  setLocalCart(cart.filter(i => String(i.product_id) !== String(productId)))
  updateCartBadge()
  renderCartPanel()
}

async function checkoutFromArticle() {
  const cart = await getLocalCart()
  if (!cart.length) return
  const cartParam = cart.map(i => `${i.product_id}:${i.qty}`).join(',')
  window.location.href = 'https://brumeconceptstore.hiboutik.com/myshop/?brume_cart=' + encodeURIComponent(cartParam)
}
</script>
